# Valid Azure staging configuration
global:
  cloud_provider: azure
  timeout: 3600
  log_level: info

azure:
  subscription_id: 12345678-1234-1234-1234-123456789abc
  location: westus2
  tenant_id: 87654321-4321-4321-4321-cba987654321

environments:
  staging:
    network_cidr: 10.1.0.0/16
    db_instance_class: Standard_D2s_v3
    db_allocated_storage: 128
    db_multi_az: false
    k8s_node_count: 3

terraform:
  backend:
    type: azurerm
    storage_account_name: devplatformstatestaging
    container_name: tfstate
    resource_group_name: devplatform-state-rg
  modules_path: terraform/modules

helm:
  chart_path: charts/devplatform-base
  default_values:
    replicaCount: 2
    image:
      tag: stable
