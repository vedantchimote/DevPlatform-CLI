# Helm values for staging environment testing
app:
  name: testapp
  environment: staging

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: "1.25"

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: false

ingress:
  enabled: true
  className: "nginx"
  hosts:
    - host: testapp-staging.example.com
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  enabled: true
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  enabled: true
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5

env:
  - name: ENVIRONMENT
    value: "staging"
  - name: LOG_LEVEL
    value: "info"
