name: Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          # Check if any test files exist
          if go list -f '{{.TestGoFiles}}' ./... | grep -q '.go'; then
            go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          else
            echo "No test files found, skipping tests"
            echo "package main" > coverage.out
          fi

      - name: Upload coverage to Codecov
        if: hashFiles('coverage.out') != ''
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: v1.55
          args: --timeout=5m
        continue-on-error: true

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.0'

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.12.0'

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.27.0'
        continue-on-error: true

      - name: Run integration tests
        run: |
          # Check if any integration test files exist
          if go list -f '{{.TestGoFiles}}' -tags=integration ./... 2>/dev/null | grep -q '.go'; then
            go test -v -tags=integration ./...
          else
            echo "No integration test files found, skipping integration tests"
          fi
        env:
          INTEGRATION_TEST: "true"
        continue-on-error: true
