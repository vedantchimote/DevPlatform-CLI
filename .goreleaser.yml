version: 2

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: devplatform-cli
    main: ./main.go
    binary: devplatform-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.GitCommit={{.Commit}}
      - -X main.BuildDate={{.Date}}
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: devplatform-cli
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/**/*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: 'Bug Fixes'
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: 'Performance Improvements'
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
    name: "{{ .ProjectName }}"
  name_template: "{{.ProjectName}} {{.Version}}"
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## DevPlatform CLI {{.Version}}
    
    ### Installation
    
    Download the appropriate binary for your platform from the assets below.
    
    #### Linux / macOS
    ```bash
    # Extract the archive
    tar -xzf devplatform-cli_{{.Version}}_<OS>_<ARCH>.tar.gz
    
    # Move to PATH
    sudo mv devplatform-cli /usr/local/bin/
    
    # Verify installation
    devplatform-cli version
    ```
    
    #### Windows
    ```powershell
    # Extract the zip file
    # Move devplatform-cli.exe to a directory in your PATH
    # Verify installation
    devplatform-cli.exe version
    ```
    
    ### What's Changed
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/{{ .ProjectName }}/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: devplatform-cli
    repository:
      owner: "{{ .Env.GITHUB_REPOSITORY_OWNER }}"
      name: homebrew-tap
    folder: Formula
    homepage: https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/devplatform-cli
    description: "Internal Developer Platform CLI for provisioning cloud infrastructure"
    license: MIT
    test: |
      system "#{bin}/devplatform-cli version"
    install: |
      bin.install "devplatform-cli"

nfpms:
  - id: devplatform-cli
    package_name: devplatform-cli
    vendor: DevPlatform
    homepage: https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/devplatform-cli
    maintainer: DevPlatform Team
    description: Internal Developer Platform CLI for provisioning cloud infrastructure
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
